<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" href="icons/icon-512.png" type="image/png">
<title>Trankas — Dashboard</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-void:#050a05;--bg-deep:#0a140a;--bg-card:rgba(12,22,12,0.88);
--bg-glass:rgba(15,26,15,0.75);--bg-sidebar:rgba(8,14,8,0.98);
--accent:#4ade80;--accent-bright:#86efac;--accent-dim:#22c55e;--accent-glow:rgba(74,222,128,0.12);
--accent-gold:#fbbf24;--accent-warn:#f87171;
--text-1:#f0fdf4;--text-2:#bbf7d0;--text-3:#86efac;--text-4:#4ade80;--text-muted:#166534;
--border:rgba(74,222,128,0.08);--border-bright:rgba(74,222,128,.18);--border-glow:rgba(74,222,128,.1);
--shadow:0 4px 24px rgba(0,0,0,.6),0 0 0 1px var(--border);
--shadow-glow:0 0 40px rgba(74,222,128,.06);
--sidebar-w:260px;--nav-h:68px;--bottom-nav-h:68px;
--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-full:9999px;
--font-d:'Space Grotesk',sans-serif;--font-b:'Inter',sans-serif;
}
html,body{height:100%;font-family:var(--font-b);background:var(--bg-void);color:var(--text-1);overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.6}
a{text-decoration:none;color:inherit}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:2px}

body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,222,128,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.012) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

.glass{background:var(--bg-glass);backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--border);border-radius:var(--r-lg)}
.card{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);transition:all .35s cubic-bezier(.4,0,.2,1)}
.card:hover{box-shadow:var(--shadow),var(--shadow-glow);border-color:var(--border-bright)}
.gradient-text{background:linear-gradient(135deg,var(--text-1),var(--accent-bright),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:12px 28px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#050a05;font-family:var(--font-d);font-weight:600;font-size:.88rem;border:none;border-radius:var(--r-md);cursor:pointer;transition:all .3s;white-space:nowrap;letter-spacing:.3px;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .5s}
.btn-primary:hover::before{transform:translateX(100%)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,222,128,.25)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:11px 26px;background:transparent;color:var(--text-1);font-family:var(--font-d);font-weight:500;font-size:.88rem;border:1px solid var(--border-bright);border-radius:var(--r-md);cursor:pointer;transition:all .3s;letter-spacing:.3px}
.btn-outline:hover{background:var(--accent-glow);border-color:var(--accent);color:var(--accent-bright)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:transparent;color:var(--text-3);font-family:var(--font-d);font-weight:500;font-size:.84rem;border:none;border-radius:var(--r-sm);cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-ghost:hover{background:rgba(74,222,128,.06);color:var(--text-2)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 12px rgba(74,222,128,.2)}50%{box-shadow:0 0 28px rgba(74,222,128,.5)}}
@keyframes slideRight{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fabPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

#loading-screen{position:fixed;inset:0;background:var(--bg-void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999}
.loading-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;animation:glowPulse 2s ease-in-out infinite;position:relative;overflow:hidden}
.loading-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.2),transparent 60%);animation:shimmer 2.5s infinite}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}

#topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;background:rgba(5,10,5,.92);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px}
.topnav-left{display:flex;align-items:center;gap:12px;flex:1}
.topnav-right{display:flex;align-items:center;gap:8px}
#hamburger{background:none;border:none;color:var(--text-muted);padding:10px;border-radius:10px;display:none;transition:all .2s}
#hamburger:hover{background:rgba(74,222,128,.06);color:var(--text-3)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.nav-logo-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.2),transparent 60%);animation:shimmer 3s infinite}
.nav-logo-text{font-family:var(--font-d);font-weight:700;font-size:1.1rem;color:var(--text-1);letter-spacing:-.3px}
.notif-btn{position:relative;background:none;border:none;color:var(--text-muted);padding:10px;border-radius:10px;transition:all .2s}
.notif-btn:hover{background:rgba(74,222,128,.06);color:var(--text-3)}
.notif-badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent-warn);color:#fff;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.user-btn{display:flex;align-items:center;gap:10px;background:none;border:none;padding:4px 12px 4px 4px;border-radius:24px;cursor:pointer;transition:all .2s}
.user-btn:hover{background:rgba(74,222,128,.06)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;font-size:.78rem;color:#050a05;border:2px solid var(--border-bright);overflow:hidden;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:.85rem;font-weight:600;color:var(--text-1);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(8,14,8,.98);border:1px solid var(--border);border-radius:var(--r-lg);padding:6px;min-width:180px;box-shadow:var(--shadow),0 0 40px rgba(0,0,0,.4);backdrop-filter:blur(20px);z-index:200;display:none;animation:fadeUp .25s ease}
.dropdown.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--text-2);font-size:.85rem;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-b);font-weight:400}
.dropdown-item:hover{background:rgba(74,222,128,.06);color:var(--text-1)}
.dropdown-item.danger{color:var(--accent-warn)}
.dropdown-item.danger:hover{background:rgba(248,113,113,.08)}

#sidebar{position:fixed;top:var(--nav-h);bottom:0;left:0;width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto;z-index:90;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-user{display:flex;align-items:center;gap:14px;padding:4px 4px 18px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.sidebar-user-info{overflow:hidden}
.sidebar-user-name{font-family:var(--font-d);font-weight:700;font-size:.9rem;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.3px}
.sidebar-user-meta{font-size:.72rem;color:var(--text-muted);margin-top:2px;font-weight:400}
.sidebar-user-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;font-size:.95rem;color:#050a05;border:2px solid var(--border-bright);flex-shrink:0;overflow:hidden}
.sidebar-user-avatar img{width:100%;height:100%;object-fit:cover}
nav#sidenav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--r-md);color:var(--text-muted);font-size:.86rem;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent;background:none;width:100%;text-align:left;letter-spacing:.2px}
.nav-item:hover{background:rgba(74,222,128,.04);color:var(--text-2);border-color:rgba(74,222,128,.08)}
.nav-item.active{background:linear-gradient(135deg,rgba(74,222,128,.12),rgba(74,222,128,.04));color:var(--accent-bright);border-color:rgba(74,222,128,.2)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(5,10,5,.7);backdrop-filter:blur(6px);z-index:80}

#main{margin-left:var(--sidebar-w);padding-top:var(--nav-h);min-height:100vh;position:relative;z-index:1}
.page-content{padding:32px;max-width:980px;animation:fadeUp .4s ease}
.page-title{font-family:var(--font-d);font-weight:800;font-size:clamp(1.6rem,3vw,2.2rem);color:var(--text-1);margin-bottom:6px;letter-spacing:-1px}
.page-subtitle{color:var(--text-muted);font-size:.88rem;margin-bottom:32px;font-weight:300}

.form-label{display:block;font-family:var(--font-d);font-size:.68rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.form-input{width:100%;padding:13px 16px;background:rgba(8,14,8,.9);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text-1);font-family:var(--font-b);font-size:.92rem;outline:none;transition:all .3s;display:block;font-weight:400}
.form-input::placeholder{color:var(--text-muted)}
.form-input:focus{border-color:var(--accent);background:rgba(74,222,128,.03);box-shadow:0 0 0 3px rgba(74,222,128,.06),0 0 20px rgba(74,222,128,.04)}
.form-input option{background:#0a140a}
.form-group{margin-bottom:18px}
textarea.form-input{resize:vertical}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab{padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:var(--font-d);font-weight:600;font-size:.86rem;cursor:pointer;transition:all .25s;margin-bottom:-1px;letter-spacing:.3px}
.tab.active{border-bottom-color:var(--accent);color:var(--accent)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px}
.section-h3{font-family:var(--font-d);font-weight:700;font-size:.72rem;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{padding:22px;display:flex;flex-direction:column;gap:10px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.12)}
.stat-num{font-family:var(--font-d);font-weight:800;font-size:2.2rem;color:var(--text-1);line-height:1;letter-spacing:-1px}
.stat-label{font-size:.76rem;color:var(--text-muted);font-weight:400}

.highlight-card{padding:24px 28px;background:linear-gradient(135deg,rgba(74,222,128,.08),rgba(74,222,128,.02));border-color:rgba(74,222,128,.2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px;margin-bottom:24px;position:relative;overflow:hidden}
.highlight-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
.highlight-tag{font-family:var(--font-d);font-weight:600;font-size:.68rem;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.highlight-main{font-family:var(--font-d);font-weight:800;font-size:clamp(1.4rem,3vw,1.9rem);color:var(--text-1);line-height:1.15;letter-spacing:-.5px}
.highlight-sub{color:var(--accent-bright);font-size:.9rem;margin-top:6px;font-weight:300}
.highlight-badge{padding:10px 20px;border-radius:var(--r-md);background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);color:var(--accent-bright);font-family:var(--font-d);font-weight:700;font-size:.88rem;white-space:nowrap}

.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.quick-card{padding:20px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;gap:10px}
.quick-card:hover{transform:translateY(-3px);border-color:var(--border-bright)}
.quick-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.12)}
.quick-label{font-family:var(--font-d);font-weight:600;font-size:.9rem;color:var(--text-1);letter-spacing:-.2px}

.map-wrap{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
#map{width:100%;height:500px}

.search-wrap{position:relative;margin-bottom:10px}
.search-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.3}
.search-input{padding-left:42px}
.suggestions-box{position:absolute;top:100%;left:0;right:0;z-index:50;margin-top:6px;background:rgba(8,14,8,.99);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none}
.suggestions-box.open{display:block}
.suggest-item{padding:12px 16px;cursor:pointer;font-size:.88rem;color:var(--text-1);border-bottom:1px solid var(--border);transition:all .15s;font-weight:400}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:rgba(74,222,128,.06);color:var(--accent-bright)}

.horario-result{padding:20px 24px;background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.18);margin-bottom:18px;display:none}
.horario-result.show{display:block}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:18px}
.week-day{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 4px;border-radius:10px;transition:all .2s}
.week-day.today{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
.week-day-label{font-family:var(--font-d);font-weight:600;font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.week-day.today .week-day-label{color:var(--accent)}
.week-day-dot{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s}
.week-day-dot.collection{background:linear-gradient(135deg,var(--accent),var(--accent-dim));box-shadow:0 0 16px rgba(74,222,128,.35);color:#050a05;font-weight:600}

.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - var(--nav-h) - 56px - 120px)}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:18px;padding:6px 0}
.chat-msg{display:flex;gap:12px;align-items:flex-start}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.chat-avatar.ai{background:rgba(134,239,172,.08);border:1px solid rgba(134,239,172,.18);color:var(--accent-bright)}
.chat-avatar.me{background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#050a05}
.bubble-ai{background:var(--bg-card);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:14px 18px;max-width:85%;color:var(--text-1);font-size:.9rem;line-height:1.65;white-space:pre-wrap;font-weight:400}
.bubble-user{background:linear-gradient(135deg,rgba(74,222,128,.14),rgba(74,222,128,.06));border:1px solid rgba(74,222,128,.2);border-radius:18px 18px 4px 18px;padding:13px 18px;max-width:80%;color:var(--text-1);font-size:.9rem;line-height:1.65;font-weight:400}
.chat-typing{display:flex;gap:6px;padding:6px 0}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:glowPulse 1.4s ease-in-out infinite}
.chat-input-wrap{display:flex;gap:12px;align-items:flex-end;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);margin-top:14px}
#chat-input{flex:1;resize:none;background:transparent;border:none;outline:none;color:var(--text-1);font-family:var(--font-b);font-size:.92rem;line-height:1.5;max-height:120px;overflow-y:auto;font-weight:400}
.chat-send-btn{background:linear-gradient(135deg,var(--accent),var(--accent-dim));border:none;border-radius:var(--r-md);padding:10px 16px;cursor:pointer;color:#050a05;transition:all .2s;flex-shrink:0;font-weight:600}
.chat-send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(74,222,128,.3)}
.chat-send-btn:disabled{opacity:.4}
.suggestions-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-size:.78rem;cursor:pointer;transition:all .2s;font-weight:400}
.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(74,222,128,.04)}

.report-types{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
.type-btn{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--r-md);border:1px solid var(--border);background:rgba(8,14,8,.6);cursor:pointer;transition:all .25s;text-align:left}
.type-btn.selected{border-color:var(--accent);background:rgba(74,222,128,.08)}
.type-btn-icon{font-size:1.4rem;flex-shrink:0}
.type-btn-label{font-family:var(--font-d);font-weight:600;font-size:.82rem;color:var(--text-1);letter-spacing:-.2px}
.type-btn-desc{font-size:.74rem;color:var(--text-muted);margin-top:3px;font-weight:300}
.photo-drop{padding:28px;text-align:center;cursor:pointer;border:1px dashed var(--border);background:rgba(8,14,8,.6);border-radius:var(--r-lg);transition:all .25s;margin-bottom:18px}
.photo-drop:hover{border-color:var(--accent);background:rgba(74,222,128,.03)}
.photo-preview{border-radius:10px;max-height:180px;width:100%;object-fit:cover}

.lista-item{display:flex;align-items:flex-start;gap:16px;padding:18px 20px;margin-bottom:12px}
.lista-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.12);flex-shrink:0;margin-top:2px}
.lista-content{flex:1;min-width:0}
.lista-title{font-family:var(--font-d);font-weight:600;font-size:.92rem;color:var(--text-1);margin-bottom:4px;letter-spacing:-.2px}
.lista-meta{font-size:.78rem;color:var(--text-3);line-height:1.6;font-weight:300}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-family:var(--font-d);font-weight:600;font-size:.7rem;flex-shrink:0;letter-spacing:.5px}
.status-pending{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:var(--accent-gold)}
.status-ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:var(--accent-bright)}
.status-search{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);color:#93c5fd}

.alerta-item{padding:18px 20px;margin-bottom:12px}
.alerta-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.alerta-tipo-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.alerta-vote-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}
.alerta-vote-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-bright));border-radius:2px;transition:width .3s}
.alerta-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vote-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.vote-btn:hover{border-color:var(--border-bright);color:var(--text-2)}
.vote-btn.voted-si{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:var(--accent)}
.vote-btn.voted-no{background:rgba(248,113,113.12);border-color:rgba(248,113,113,.3);color:var(--accent-warn)}
.vote-count{font-size:.74rem;color:var(--text-muted);margin-left:4px;font-weight:400}

.puntos-filter{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.filter-chip{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.82rem;font-weight:600;font-family:var(--font-d);cursor:pointer;transition:all .25s;letter-spacing:.3px}
.filter-chip.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.25);color:var(--accent-bright)}

#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:rgba(5,10,5,.97);backdrop-filter:blur(30px);border-top:1px solid var(--border);z-index:95;padding:0 6px}
.bnav-inner{display:flex;height:100%}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text-muted);font-size:.62rem;font-family:var(--font-d);font-weight:500;transition:color .2s;border:none;background:none;padding:8px 4px;letter-spacing:.5px}
.bnav-item svg{width:22px;height:22px}
.bnav-item.active{color:var(--accent)}

.fab{position:fixed;bottom:84px;right:22px;z-index:500;display:none}
.fab-main{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dim));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(74,222,128,.35),0 0 0 1px rgba(74,222,128,.2);animation:glowPulse 3s ease-in-out infinite;transition:all .3s;color:#050a05}
.fab-main svg{transition:transform .3s}
.fab-main.open svg{transform:rotate(45deg)}
.fab-actions{position:absolute;bottom:68px;right:0;display:flex;flex-direction:column;gap:12px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s}
.fab-actions.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.fab-action{display:flex;align-items:center;gap:12px;padding:11px 18px;border-radius:var(--r-full);background:var(--bg-card);border:1px solid var(--border);color:var(--text-1);font-size:.85rem;font-weight:500;cursor:pointer;backdrop-filter:blur(20px);transition:all .2s;white-space:nowrap;font-family:var(--font-b)}
.fab-action:hover{border-color:var(--border-bright);background:rgba(74,222,128,.06)}

.modal-backdrop{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,10,5,.9);backdrop-filter:blur(16px);opacity:0;pointer-events:none;transition:opacity .35s}
.modal-backdrop.open{opacity:1;pointer-events:auto}
.modal{position:relative;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;background:var(--bg-deep);border:1px solid var(--border-bright);border-radius:var(--r-xl);box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(74,222,128,.08),0 0 60px rgba(74,222,128,.03);backdrop-filter:blur(40px);animation:fadeUp .4s cubic-bezier(.4,0,.2,1)}
.modal-glow{position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.modal-body{padding:32px}
.modal-title{font-family:var(--font-d);font-weight:800;font-size:1.35rem;color:var(--text-1);margin-bottom:8px;letter-spacing:-.5px}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:8px;border-radius:50%;transition:all .2s}
.modal-close:hover{background:rgba(74,222,128,.08);color:var(--text-3)}
.modal-error{padding:12px 16px;border-radius:var(--r-md);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#fca5a5;font-size:.84rem;margin-bottom:16px;display:none;font-weight:400}
.modal-error.show{display:block}

.toast-container{position:fixed;bottom:88px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 20px;border-radius:var(--r-md);font-size:.85rem;font-weight:500;backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;max-width:300px;animation:slideRight .35s ease;border:1px solid}
.toast-success{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.2);color:#86efac}
.toast-error{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.2);color:#fca5a5}
.toast-info{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.2);color:#93c5fd}

@media(max-width:767px){
  #hamburger{display:flex !important}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  #main{margin-left:0 !important;padding-bottom:var(--bottom-nav-h)}
  #bottom-nav{display:block}
  .fab{display:block}
  .toast-container{bottom:84px}
  .stat-grid{grid-template-columns:repeat(3,1fr)}
  .quick-grid{grid-template-columns:repeat(2,1fr)}
  .report-types{grid-template-columns:1fr 1fr}
  .page-content{padding:20px 16px}
}
@media(min-width:768px){
  .fab{display:block}
  .toast-container{bottom:28px;right:28px}
}

.leaflet-container{background:#050a05 !important;font-family:var(--font-b) !important}
.leaflet-control-zoom a{background:var(--bg-card) !important;color:var(--text-1) !important;border-color:var(--border) !important}
.leaflet-popup-content-wrapper{background:var(--bg-card) !important;border:1px solid var(--border) !important;color:var(--text-1) !important;border-radius:var(--r-md) !important;box-shadow:var(--shadow) !important}
.leaflet-popup-tip{background:var(--bg-card) !important}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">

</div>

<nav id="topnav">

    <a href="/dashboard" class="nav-logo">
      <div class="nav-logo-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 0-7.5 16.5"/><path d="M12 2c2 4 4 8 0 14"/><path d="M12 2c-2 4-4 8 0 14"/></svg></div>
      <span class="nav-logo-text">Trankas</span>
    </a>
  </div>
  <div class="topnav-right">
    <div style="position:relative">

        <span class="notif-badge">3</span>
      </button>
      <div class="dropdown" id="notif-dropdown" style="width:300px">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-family:var(--font-d);font-weight:700;font-size:.9rem;letter-spacing:-.3px">Notificaciones</div>
        <div class="dropdown-item" style="flex-direction:column;align-items:flex-start;gap:3px"><span style="font-weight:600;font-size:.85rem">Recolección mañana</span><span style="font-size:.76rem;color:var(--text-muted)">El camión pasará por tu sector · Hace 2h</span></div>
        <div class="dropdown-item" style="flex-direction:column;align-items:flex-start;gap:3px"><span style="font-weight:600;font-size:.85rem">Reporte resuelto</span><span style="font-size:.76rem;color:var(--text-muted)">Tu reporte ha sido atendido · Hace 5h</span></div>
        <div class="dropdown-item" style="flex-direction:column;align-items:flex-start;gap:3px"><span style="font-weight:600;font-size:.85rem">Alerta en tu zona</span><span style="font-size:.76rem;color:var(--text-muted)">Acumulación a 200m · Hace 1d</span></div>
      </div>
    </div>
    <div style="position:relative">

        <span class="user-name" id="nav-name">...</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dropdown" id="user-dropdown">
        <div class="dropdown-item" onclick="goTo('cuenta')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mi Cuenta

        </div>
      </div>
    </div>
  </div>
</nav>

      <div class="sidebar-user-name" id="sidebar-name">...</div>
      <div class="sidebar-user-meta" id="sidebar-meta">Ciudadano</div>
    </div>
  </div>
  <nav id="sidenav">
    <button class="nav-item" data-page="inicio" onclick="goTo('inicio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio

    <button class="nav-item" data-page="horario" onclick="goTo('horario')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Mi Horario
    </button>
    <button class="nav-item" data-page="mapa" onclick="goTo('mapa')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Mapa
    </button>
    <button class="nav-item" data-page="asistente" onclick="goTo('asistente')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>Asistente IA
    </button>
    <button class="nav-item" data-page="reportes" onclick="goTo('reportes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Reportar
    </button>
    <button class="nav-item" data-page="solicitud" onclick="goTo('solicitud')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Recolección Especial
    </button>
    <button class="nav-item" data-page="alertas" onclick="goTo('alertas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Alertas
    </button>
    <button class="nav-item" data-page="cuenta" onclick="goTo('cuenta')">

  </nav>
  <div class="sidebar-footer">

</aside>

<div id="main">
  <div id="page-container"></div>
</div>

<nav id="bottom-nav">

    <button class="bnav-item" data-page="inicio" onclick="goTo('inicio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
