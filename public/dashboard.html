<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trankas — Dashboard</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-void:#0d1a0e;--bg-deep:#18301b;--bg-card:rgba(30,61,33,0.78);
--bg-glass:rgba(24,48,27,0.65);--bg-sidebar:rgba(15,30,16,0.98);
--accent:#6cd97b;--accent-bright:#8eeaa0;--accent-gold:#c9a84c;--accent-warn:#ff6b35;
--text-1:#e8f5e9;--text-2:#b8d9bb;--text-3:#6a9b6e;--text-4:#3d6640;
--border:rgba(108,217,123,0.14);--border-bright:rgba(142,234,160,0.28);
--shadow:0 8px 32px rgba(0,0,0,0.5);
--sidebar-w:240px;--nav-h:60px;--bottom-nav-h:64px;
--r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-full:9999px;
--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font-b);background:var(--bg-void);color:var(--text-1);overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:var(--font-b);cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--text-4);border-radius:2px}

.glass{background:var(--bg-glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r-lg)}
.card{background:var(--bg-card);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.gradient-text{background:linear-gradient(135deg,var(--accent-bright),var(--accent),#2f5e35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;background:linear-gradient(135deg,var(--accent),#44874d);color:#fff;font-family:var(--font-d);font-weight:600;font-size:.88rem;border:none;border-radius:var(--r-full);cursor:pointer;transition:all .3s;white-space:nowrap}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,217,123,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;background:transparent;color:var(--text-1);font-family:var(--font-d);font-weight:600;font-size:.88rem;border:1px solid var(--border-bright);border-radius:var(--r-full);cursor:pointer;transition:all .3s}
.btn-outline:hover{background:rgba(108,217,123,.05);color:var(--accent-bright)}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;color:var(--text-3);font-family:var(--font-d);font-weight:500;font-size:.85rem;border:none;border-radius:var(--r-md);cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:rgba(108,217,123,.05);color:var(--text-2)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 16px rgba(108,217,123,.25)}50%{box-shadow:0 0 36px rgba(108,217,123,.55)}}
@keyframes slideRight{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fabPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

#loading-screen{position:fixed;inset:0;background:var(--bg-void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999}
.loading-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#44874d);display:flex;align-items:center;justify-content:center;animation:glow 2s ease-in-out infinite}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}

#topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;background:rgba(6,14,7,.88);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.topnav-left{display:flex;align-items:center;gap:10px;flex:1}
.topnav-right{display:flex;align-items:center;gap:6px}
#hamburger{background:none;border:none;color:var(--text-3);padding:8px;border-radius:10px;display:none;transition:background .2s}
#hamburger:hover{background:rgba(255,255,255,.06)}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo-icon{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#44874d);display:flex;align-items:center;justify-content:center}
.nav-logo-text{font-family:var(--font-d);font-weight:700;font-size:1rem;color:var(--text-1)}
.notif-btn{position:relative;background:none;border:none;color:var(--text-3);padding:8px;border-radius:10px;transition:background .2s}
.notif-btn:hover{background:rgba(255,255,255,.06)}
.notif-badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent-warn);color:#fff;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.user-btn{display:flex;align-items:center;gap:8px;background:none;border:none;padding:4px 10px 4px 4px;border-radius:20px;cursor:pointer;transition:background .2s}
.user-btn:hover{background:rgba(108,217,123,.06)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#44874d);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;font-size:.78rem;color:#fff;border:2px solid var(--border-bright);overflow:hidden;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:.85rem;font-weight:600;color:var(--text-1);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(8,18,9,.98);border:1px solid var(--border);border-radius:var(--r-lg);padding:6px;min-width:170px;box-shadow:var(--shadow);backdrop-filter:blur(20px);z-index:200;display:none;animation:fadeUp .25s ease}
.dropdown.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text-2);font-size:.85rem;cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-b)}
.dropdown-item:hover{background:rgba(108,217,123,.07)}
.dropdown-item.danger{color:#ff6b35}
.dropdown-item.danger:hover{background:rgba(255,107,53,.08)}

#sidebar{position:fixed;top:var(--nav-h);bottom:0;left:0;width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 12px;overflow-y:auto;z-index:90;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-user{display:flex;align-items:center;gap:12px;padding:4px 4px 16px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.sidebar-user-info{overflow:hidden}
.sidebar-user-name{font-family:var(--font-d);font-weight:700;font-size:.88rem;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-meta{font-size:.7rem;color:var(--text-4);margin-top:1px}
.sidebar-user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#44874d);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;font-size:.9rem;color:#fff;border:2px solid var(--border-bright);flex-shrink:0;overflow:hidden}
.sidebar-user-avatar img{width:100%;height:100%;object-fit:cover}
nav#sidenav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-md);color:var(--text-3);font-size:.87rem;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(108,217,123,.05);color:var(--text-2)}
.nav-item.active{background:linear-gradient(135deg,rgba(108,217,123,.14),rgba(108,217,123,.06));color:var(--accent-bright);border-color:rgba(108,217,123,.22)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{border-top:1px solid var(--border);padding-top:12px;margin-top:12px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:80}

#main{margin-left:var(--sidebar-w);padding-top:var(--nav-h);min-height:100vh}
.page-content{padding:28px;max-width:960px;animation:fadeUp .4s ease}
.page-title{font-family:var(--font-d);font-weight:800;font-size:clamp(1.5rem,3vw,2rem);color:var(--text-1);margin-bottom:4px}
.page-subtitle{color:var(--text-3);font-size:.88rem;margin-bottom:28px}

.form-label{display:block;font-family:var(--font-d);font-size:.72rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-3);margin-bottom:7px}
.form-input{width:100%;padding:12px 15px;background:rgba(10,22,11,.85);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text-1);font-family:var(--font-b);font-size:.93rem;outline:none;transition:all .25s;display:block}
.form-input::placeholder{color:var(--text-4)}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,217,123,.08)}
.form-input option{background:#0a160b}
.form-group{margin-bottom:16px}
textarea.form-input{resize:vertical}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-3);font-family:var(--font-d);font-weight:600;font-size:.87rem;cursor:pointer;transition:all .2s;margin-bottom:-1px}
.tab.active{border-bottom-color:var(--accent);color:var(--accent)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.section-h3{font-family:var(--font-d);font-weight:700;font-size:.78rem;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-card{padding:20px;display:flex;flex-direction:column;gap:8px}
.stat-icon{font-size:1.4rem}
.stat-num{font-family:var(--font-d);font-weight:800;font-size:2rem;color:var(--text-1);line-height:1}
.stat-label{font-size:.78rem;color:var(--text-3)}

.highlight-card{padding:22px 26px;background:linear-gradient(135deg,rgba(108,217,123,.12),rgba(108,217,123,.04));border-color:rgba(108,217,123,.28);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:20px}
.highlight-tag{font-family:var(--font-d);font-weight:700;font-size:.7rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.highlight-main{font-family:var(--font-d);font-weight:800;font-size:clamp(1.3rem,3vw,1.8rem);color:var(--text-1);line-height:1.15}
.highlight-sub{color:var(--accent-bright);font-size:.9rem;margin-top:4px}
.highlight-badge{padding:9px 18px;border-radius:var(--r-full);background:rgba(108,217,123,.16);border:1px solid rgba(108,217,123,.3);color:var(--accent-bright);font-family:var(--font-d);font-weight:700;font-size:.88rem;white-space:nowrap}

.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.quick-card{padding:18px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;gap:8px}
.quick-card:hover{transform:translateY(-2px);border-color:var(--border-bright)}
.quick-icon{font-size:1.7rem}
.quick-label{font-family:var(--font-d);font-weight:600;font-size:.88rem;color:var(--text-1)}

.map-wrap{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
#map{width:100%;height:500px}

.search-wrap{position:relative;margin-bottom:8px}
.search-prefix{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
.search-input{padding-left:40px}
.suggestions-box{position:absolute;top:100%;left:0;right:0;z-index:50;margin-top:4px;background:rgba(8,18,9,.99);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
.suggestions-box.open{display:block}
.suggest-item{padding:11px 14px;cursor:pointer;font-size:.88rem;color:var(--text-1);border-bottom:1px solid var(--border);transition:background .15s}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:rgba(108,217,123,.07)}

.horario-result{padding:18px 20px;background:rgba(108,217,123,.08);border-color:rgba(108,217,123,.28);margin-bottom:16px;display:none}
.horario-result.show{display:block}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px}
.week-day{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px;border-radius:10px}
.week-day.today{background:rgba(108,217,123,.12);border:1px solid rgba(108,217,123,.25)}
.week-day-label{font-family:var(--font-d);font-weight:600;font-size:.68rem;color:var(--text-4);text-transform:uppercase}
.week-day.today .week-day-label{color:var(--accent)}
.week-day-dot{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.82rem}
.week-day-dot.collection{background:linear-gradient(135deg,var(--accent),#44874d);box-shadow:0 0 12px rgba(108,217,123,.4)}

.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - var(--nav-h) - 56px - 120px)}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding:4px 0}
.chat-msg{display:flex;gap:10px;align-items:flex-start}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.chat-avatar.ai{background:rgba(142,234,160,.1);border:1px solid rgba(142,234,160,.25)}
.chat-avatar.me{background:linear-gradient(135deg,var(--accent),#44874d)}
.bubble-ai{background:var(--bg-card);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:13px 16px;max-width:85%;color:var(--text-1);font-size:.9rem;line-height:1.6;white-space:pre-wrap}
.bubble-user{background:linear-gradient(135deg,rgba(108,217,123,.16),rgba(108,217,123,.08));border:1px solid rgba(108,217,123,.22);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:80%;color:var(--text-1);font-size:.9rem;line-height:1.6}
.chat-typing{display:flex;gap:5px;padding:4px 0}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:glow 1.4s ease-in-out infinite}
.chat-input-wrap{display:flex;gap:10px;align-items:flex-end;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);margin-top:12px}
#chat-input{flex:1;resize:none;background:transparent;border:none;outline:none;color:var(--text-1);font-family:var(--font-b);font-size:.92rem;line-height:1.5;max-height:120px;overflow-y:auto}
.chat-send-btn{background:linear-gradient(135deg,var(--accent),#44874d);border:none;border-radius:var(--r-md);padding:9px 14px;cursor:pointer;color:#fff;transition:all .2s;flex-shrink:0}
.chat-send-btn:hover{transform:translateY(-1px)}
.chat-send-btn:disabled{opacity:.4}
.suggestions-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);font-size:.78rem;cursor:pointer;transition:all .2s}
.chip:hover{border-color:var(--accent);color:var(--accent)}

.report-types{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.type-btn{display:flex;align-items:flex-start;gap:10px;padding:13px;border-radius:var(--r-md);border:1px solid var(--border);background:rgba(10,22,11,.5);cursor:pointer;transition:all .2s;text-align:left}
.type-btn.selected{border-color:var(--accent);background:rgba(108,217,123,.09)}
.type-btn-icon{font-size:1.3rem;flex-shrink:0}
.type-btn-label{font-family:var(--font-d);font-weight:700;font-size:.8rem;color:var(--text-1)}
.type-btn-desc{font-size:.72rem;color:var(--text-4);margin-top:2px}
.photo-drop{padding:24px;text-align:center;cursor:pointer;border:1px dashed var(--border);background:rgba(10,22,11,.5);border-radius:var(--r-lg);transition:all .2s;margin-bottom:16px}
.photo-drop:hover{border-color:var(--accent)}
.photo-preview{border-radius:10px;max-height:180px;width:100%;object-fit:cover}

.lista-item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;margin-bottom:10px}
.lista-icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.lista-content{flex:1;min-width:0}
.lista-title{font-family:var(--font-d);font-weight:700;font-size:.9rem;color:var(--text-1);margin-bottom:3px}
.lista-meta{font-size:.78rem;color:var(--text-3);line-height:1.5}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-family:var(--font-d);font-weight:700;font-size:.72rem;flex-shrink:0}
.status-pending{background:rgba(201,168,76,.14);border:1px solid rgba(201,168,76,.3);color:var(--accent-gold)}
.status-ok{background:rgba(108,217,123,.12);border:1px solid rgba(108,217,123,.28);color:var(--accent-bright)}
.status-search{background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.28);color:#80c8ff}

.alerta-item{padding:16px 18px;margin-bottom:10px}
.alerta-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.alerta-tipo-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.alerta-vote-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px}
.alerta-vote-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.alerta-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.vote-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-3);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.vote-btn.voted-si{background:rgba(108,217,123,.18);border-color:rgba(108,217,123,.4);color:var(--accent)}
.vote-btn.voted-no{background:rgba(255,107,53,.14);border-color:rgba(255,107,53,.3);color:#ff6b35}
.vote-count{font-size:.72rem;color:var(--text-4);margin-left:4px}

.puntos-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-3);font-size:.8rem;font-weight:600;font-family:var(--font-d);cursor:pointer;transition:all .2s}
.filter-chip.active{background:rgba(108,217,123,.16);border-color:rgba(108,217,123,.35);color:var(--accent-bright)}

#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:rgba(6,14,7,.97);backdrop-filter:blur(30px);border-top:1px solid var(--border);z-index:95;padding:0 4px}
.bnav-inner{display:flex;height:100%}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-4);font-size:.6rem;font-family:var(--font-d);font-weight:500;transition:color .2s;border:none;background:none;padding:6px 4px}
.bnav-item svg{width:22px;height:22px}
.bnav-item.active{color:var(--accent)}

.fab{position:fixed;bottom:80px;right:20px;z-index:500;display:none}
.fab-main{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#44874d);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(108,217,123,.4);animation:glow 3s ease-in-out infinite;transition:all .3s}
.fab-main svg{transition:transform .3s}
.fab-main.open svg{transform:rotate(45deg)}
.fab-actions{position:absolute;bottom:64px;right:0;display:flex;flex-direction:column;gap:10px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s}
.fab-actions.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.fab-action{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r-full);background:var(--bg-card);border:1px solid var(--border);color:var(--text-1);font-size:.83rem;font-weight:500;cursor:pointer;backdrop-filter:blur(20px);transition:all .2s;white-space:nowrap}
.fab-action:hover{border-color:var(--border-bright);background:rgba(108,217,123,.06)}

.modal-backdrop{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(2,9,4,.88);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.open{opacity:1;pointer-events:auto}
.modal{position:relative;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;background:rgba(8,18,9,.98);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:0 24px 80px rgba(0,0,0,.7);backdrop-filter:blur(40px);animation:fadeUp .4s cubic-bezier(.4,0,.2,1)}
.modal-glow{position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.modal-body{padding:28px}
.modal-title{font-family:var(--font-d);font-weight:800;font-size:1.3rem;color:var(--text-1);margin-bottom:6px}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-3);cursor:pointer;padding:8px;border-radius:50%}
.modal-close:hover{background:rgba(255,255,255,.06)}
.modal-error{padding:11px 14px;border-radius:var(--r-md);background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);color:#ffb49a;font-size:.83rem;margin-bottom:14px;display:none}
.modal-error.show{display:block}

.toast-container{position:fixed;bottom:84px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:13px 18px;border-radius:var(--r-md);font-size:.84rem;font-weight:500;backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;max-width:300px;animation:slideRight .3s ease}
.toast-success{background:rgba(108,217,123,.16);border:1px solid rgba(108,217,123,.3);color:#a8f0c0}
.toast-error{background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.3);color:#ffb49a}
.toast-info{background:rgba(52,152,219,.14);border:1px solid rgba(52,152,219,.28);color:#a0c8e8}

@media(max-width:767px){
  #hamburger{display:flex !important}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  #main{margin-left:0 !important;padding-bottom:var(--bottom-nav-h)}
  #bottom-nav{display:block}
  .fab{display:block}
  .toast-container{bottom:80px}
  .stat-grid{grid-template-columns:repeat(3,1fr)}
  .quick-grid{grid-template-columns:repeat(2,1fr)}
  .report-types{grid-template-columns:1fr 1fr}
  .page-content{padding:18px 14px}
}
@media(min-width:768px){
  .fab{display:block}
  .toast-container{bottom:24px;right:24px}
}

.leaflet-container{background:#060e07 !important;font-family:var(--font-b) !important}
.leaflet-control-zoom a{background:var(--bg-card) !important;color:var(--text-1) !important;border-color:var(--border) !important}
.leaflet-popup-content-wrapper{background:var(--bg-card) !important;border:1px solid var(--border) !important;color:var(--text-1) !important;border-radius:var(--r-md) !important;box-shadow:var(--shadow) !important}
.leaflet-popup-tip{background:var(--bg-card) !important}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 0-7.5 16.5"/><path d="M12 2c2 4 4 8 0 14"/><path d="M12 2c-2 4-4 8 0 14"/></svg>
  </div>
  <div class="loading-spinner"></div>
</div>

<nav id="topnav">

    <button id="hamburger" onclick="toggleSidebar()">

    </button>
    <a href="/dashboard" class="nav-logo">
      <div class="nav-logo-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 0-7.5 16.5"/><path d="M12 2c2 4 4 8 0 14"/><path d="M12 2c-2 4-4 8 0 14"/></svg></div>
      <span class="nav-logo-text">Trankas</span>
    </a>
  </div>
  <div class="topnav-right">
    <div style="position:relative">
      <button class="notif-btn" onclick="toggleNotif()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge">3</span>
      </button>
      <div class="dropdown" id="notif-dropdown" style="width:290px">
        <div style="padding:12px 14px;border-bottom:1px solid var(--border);font-family:var(--font-d);font-weight:700;font-size:.88rem">Notificaciones</div>
        <div class="dropdown-item" style="flex-direction:column;align-items:flex-start;gap:2px"><span style="font-weight:600;font-size:.84rem">Recolección mañana</span><span style="font-size:.76rem;color:var(--text-3)">El camión pasará por tu sector · Hace 2h</span></div>
        <div class="dropdown-item" style="flex-direction:column;align-items:flex-start;gap:2px"><span style="font-weight:600;font-size:.84rem">Reporte resuelto</span><span style="font-size:.76rem;color:var(--text-3)">Tu reporte ha sido atendido · Hace 5h</span></div>
        <div class="dropdown-item" style="flex-direction:column;align-items:flex-start;gap:2px"><span style="font-weight:600;font-size:.84rem">Alerta en tu zona</span><span style="font-size:.76rem;color:var(--text-3)">Acumulación a 200m · Hace 1d</span></div>
      </div>
    </div>
    <div style="position:relative">
      <button class="user-btn" id="user-btn" onclick="toggleUserMenu()">
        <div class="user-avatar" id="nav-avatar"></div>
        <span class="user-name" id="nav-name">...</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dropdown" id="user-dropdown">
        <div class="dropdown-item" onclick="goTo('cuenta')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mi Cuenta
        </div>
        <div class="dropdown-item danger" onclick="doLogout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-user">
    <div class="sidebar-user-avatar" id="sidebar-avatar"></div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="sidebar-name">...</div>
      <div class="sidebar-user-meta" id="sidebar-meta">Ciudadano</div>
    </div>
  </div>
  <nav id="sidenav">
    <button class="nav-item" data-page="inicio" onclick="goTo('inicio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
    </button>
    <button class="nav-item" data-page="horario" onclick="goTo('horario')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Mi Horario
    </button>
    <button class="nav-item" data-page="mapa" onclick="goTo('mapa')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Mapa
    </button>
    <button class="nav-item" data-page="asistente" onclick="goTo('asistente')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>Asistente IA
    </button>
    <button class="nav-item" data-page="reportes" onclick="goTo('reportes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Reportar
    </button>
    <button class="nav-item" data-page="solicitud" onclick="goTo('solicitud')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Recolección Especial
    </button>
    <button class="nav-item" data-page="alertas" onclick="goTo('alertas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Alertas
    </button>
    <button class="nav-item" data-page="cuenta" onclick="goTo('cuenta')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mi Cuenta
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" style="color:#ff6b35;width:100%" onclick="doLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión
    </button>
  </div>
</aside>

<div id="main">
  <div id="page-container"></div>
</div>

<nav id="bottom-nav">
  <div class="bnav-inner">
    <button class="bnav-item" data-page="inicio" onclick="goTo('inicio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
    </button>
    <button class="bnav-item" data-page="horario" onclick="goTo('horario')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Horario
    </button>
    <button class="bnav-item" data-page="mapa" onclick="goTo('mapa')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Mapa

    </button>
    <button class="bnav-item" data-page="alertas" onclick="goTo('alertas')">

<div class="fab">
  <div class="fab-actions" id="fab-actions">
    <button class="fab-action" onclick="goTo('reportes');closeFab()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Reportar

    </button>
  </div>
  <button class="fab-main" id="fab-btn" onclick="toggleFab()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<div class="modal-backdrop" id="onboard-backdrop">
  <div class="modal" style="max-width:430px">
    <div class="modal-glow"></div>
    <div class="modal-body" id="onboard-body"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/barrios.js"></script>
<script src="/js/dashboard.js"></script>
</body>
